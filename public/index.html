<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hady APIs</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Hady APIs - Colección de APIs creadas por Hady D'xyz. Accede a múltiples servicios y herramientas de manera rápida y sencilla.">
<meta name="keywords" content="Hady APIs, APIs, Hady D'xyz, herramientas, servicios web">
<meta name="author" content="Hady D'xyz">
<meta property="og:title" content="Hady APIs">
<meta property="og:description" content="Colección de APIs creadas por Hady D'xyz. Accede a múltiples servicios y herramientas de manera rápida y sencilla.">
<meta property="og:image" content="favicon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    :root {
      --primary: #0A84FF;
      --primary-light: rgba(10, 132, 255, 0.1);
      --secondary: #5E5CE6;
      --background: #000000;
      --surface: #1C1C1E;
      --surface-2: #2C2C2E;
      --surface-3: #3A3A3C;
      --text: #FFFFFF;
      --text-secondary: #8E8E93;
      --text-tertiary: #636366;
      --border: #38383A;
      --success: #30D158;
      --warning: #FF9F0A;
      --danger: #FF453A;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.6);
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--background);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
    
    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 20px; 
    }
    
    /* Header iOS 17 */
    .header { 
      background: var(--surface);
      padding: 2rem 1.5rem;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      text-align: center;
      position: relative;
      border: 1px solid var(--border);
    }
    
    .logo { 
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .logo-gradient {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle { 
      color: var(--text-secondary); 
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    /* Stats iOS 17 */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }
    
    .stat-card {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: 14px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    
    .stat-card:hover {
      background: var(--surface-2);
      transform: translateY(-2px);
    }
    
    .stat-icon {
      width: 48px;
      height: 48px;
      background: var(--primary-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.3rem;
      color: var(--primary);
    }
    
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    
    .stat-label {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.85rem;
    }
    
    /* Navegación por categorías iOS */
    .categories-nav {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .category-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.6rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }
    
    .category-btn.active, .category-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    /* Secciones de categorías */
    .category-section {
      margin-bottom: 2rem;
      display: none;
    }
    
    .category-section.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    
    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    
    .category-icon {
      width: 40px;
      height: 40px;
      background: var(--primary-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--primary);
    }
    
    .category-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }
    
    .category-count {
      background: var(--primary);
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    /* Endpoints en lista vertical iOS */
    .endpoints-list { 
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .endpoint-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      border: 1px solid var(--border);
    }
    
    .endpoint-card:hover {
      background: var(--surface-2);
      transform: translateY(-2px);
    }
    
    .endpoint-header { 
      display: flex; 
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    
    .endpoint-method {
      background: var(--primary);
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .endpoint-name { 
      color: var(--text);
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 600;
      max-width: 70%;
      word-break: break-word;
    }
    
    .endpoint-description { 
      color: var(--text-secondary); 
      margin-bottom: 1.2rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    
    .parameters { 
      background: var(--surface-2);
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
    }
    
    .param-item { 
      display: flex; 
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .param-item:last-child {
      border-bottom: none;
    }
    
    .param-name { 
      color: var(--primary); 
      font-family: 'SF Mono', 'Courier New', monospace;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .param-type { 
      color: var(--text-secondary); 
      font-size: 0.75rem;
      background: var(--surface-3);
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
    }
    
    .try-section { margin-top: 1.2rem; }
    
    .input-group { 
      margin-bottom: 0.8rem; 
      position: relative; 
    }
    
    input {
      padding: 0.8rem 0.8rem 0.8rem 2.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    
    input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .input-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-size: 0.9rem;
    }
    
    .action-buttons {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    
    .action-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .action-btn:hover {
      background: var(--surface-3);
      transform: translateY(-1px);
    }
    
    .action-btn.primary {
      background: var(--primary);
      color: white;
    }
    
    .action-btn.primary:hover {
      background: #0070E0;
    }
    
    .action-btn.success {
      background: var(--success);
      color: white;
    }
    
    .action-btn.success:hover {
      background: #25C24E;
    }
    
    .action-btn.warning {
      background: var(--warning);
      color: white;
    }
    
    .action-btn.warning:hover {
      background: #E68A00;
    }
    
    button:disabled { 
      background: var(--surface-3); 
      cursor: not-allowed;
      transform: none;
      color: var(--text-tertiary);
    }
    
    .result {
      background: var(--surface-2);
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 0.8rem;
    }
    
    .result.show { 
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    .result.hidden {
      display: none;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .loading { 
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Footer iOS */
    .footer {
      text-align: center;
      margin-top: 3rem;
      padding: 2rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      background: var(--surface);
      border-radius: 14px;
    }
    
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.2rem 0;
    }
    
    .social-icon {
      width: 40px;
      height: 40px;
      background: var(--surface-2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
    }
    
    .social-icon:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-1px);
    }
    
    /* Refresh button iOS */
    .refresh-container {
      text-align: center;
      margin: 1.5rem 0;
    }
    
    .refresh-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.8rem 1.5rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .refresh-btn:hover {
      background: var(--surface-2);
    }
    
    /* Tooltips iOS */
    .tooltip {
      position: relative;
    }
    
    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      font-size: 0.8rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 100;
    }
    
    .tooltip:hover::after {
      opacity: 1;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .logo {
        font-size: 2rem;
      }
      
      .header {
        padding: 1.5rem 1rem;
      }
      
      .container {
        padding: 15px;
      }
      
      .endpoint-header {
        flex-direction: column;
        gap: 0.8rem;
        align-items: flex-start;
      }
      
      .endpoint-name {
        max-width: 100%;
      }
    }
    
    .container {
        max-width: 420px;
        margin: 35px auto;
        padding: 18px;
    }

    .card {
        background: rgba(255,255,255,0.07);
        padding: 22px;
        border-radius: 22px;

        /* 🔥 Borde y brillo estilo tu API */
        border: 1px solid rgba(99,102,241,0.45);
        box-shadow: 0 0 18px rgba(99,102,241,0.25);

        backdrop-filter: blur(16px);
        margin-bottom: 20px;
    }

    .profile {
        text-align: center;
    }

    .profile img {
        width: 95px;
        height: 95px;
        border-radius: 50%;

        /* 🔥 Borde azul violeta */
        border: 3px solid #6366f1;
        box-shadow: 0 0 15px rgba(99,102,241,0.5);

        margin-bottom: 10px;
    }

    .name {
        font-size: 1.4rem;
        font-weight: bold;

        /* Color morado-azulado */
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        color: transparent;
    }

    .tag {
        opacity: 0.8;
        font-size: 0.9rem;
    }

    .badges {
        display: flex;
        justify-content: center;
        margin-top: 12px;
        gap: 10px;
    }

    .badge {
        padding: 5px 12px;
        font-size: 0.8rem;

        /* Fondo con luz azul */
        background: rgba(99,102,241,0.18);
        border-radius: 10px;
        border: 1px solid rgba(99,102,241,0.45);

        display: flex;
        align-items: center;
        gap: 6px;

        box-shadow: 0 0 10px rgba(99,102,241,0.35);
    }

    .badge i {
        color: #8b5cf6;
    }

    /* --- ESTADÍSTICAS ESTILO API --- */
    .api-stats {
        margin-top: 20px;
        background: rgba(255,255,255,0.04);
        padding: 15px;
        border-radius: 16px;

        border: 1px solid rgba(99,102,241,0.3);
        box-shadow: 0 0 12px rgba(99,102,241,0.2);
    }

    .stat {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        font-size: 0.92rem;
    }

    .stat:last-child {
        border-bottom: none;
    }

    .stat i {
        color: #6366f1;
        margin-right: 6px;
    }
    
  </style>
</head>
<body>
<audio id="music" src="musica.mp3" preload="auto"></audio>
  <div class="container">
    <div class="header animate__animated animate__fadeInDown">
      <div class="logo">
        <i class="fas fa-rocket"></i> <span class="logo-gradient">Hady APIs</span>
      </div>
      <div class="subtitle">
        <i class="fas fa-bolt"></i> Panel Profesional 
        <i class="fas fa-heart" style="color: var(--danger);"></i> por Hady D'xyz 
        <span>🇵🇪</span>
      </div>
    </div>
    
    
    <div class="container">

    <!-- CARD PERFIL -->
    <div class="card profile">

        <img src="profile.png" alt="Foto">

        <div class="name">Hady D'xyz</div>
        <div class="tag">@devhades02 • Founder Hady APIs</div>

        <div class="badges">
            <div class="badge"><i class="fas fa-code"></i> Dev</div>

        </div>

        <!-- ESTADÍSTICAS TIPO API -->
        <div class="api-stats">
            <div class="stat">
                <span><i class="fa-solid fa-layer-group"></i> Total de APIs</span>

            </div>

            <div class="stat">
                <span><i class="fa-solid fa-users"></i> Usuarios totales</span>

            <div class="stat">
                <span><i class="fa-solid fa-download"></i> Tiempo de rpt</span>
                <span id="response-time">0ms</span>
            </div>

                <span><i class="fa-solid fa-circle-check"></i> Estado</span>

            </div>
        </div>
    </div>

</div>



    <!-- Navegación por categorías -->
    <div class="categories-nav" id="categories-nav">
      <!-- Se generará dinámicamente -->
    </div>

    <!-- Botón de actualizar -->
    <div class="refresh-container">
      <button class="refresh-btn" onclick="refreshAllEndpoints()">
        <i class="fas fa-sync-alt"></i> Actualizar Endpoints
      </button>
    </div>

    <!-- Contenedor de categorías -->
    <div id="categories-container">
      <!-- Se generará dinámicamente -->
    </div>

    <!-- Estado de carga -->
    <div id="loading-state" style="text-align: center; padding: 3rem; color: var(--text-secondary);" class="animate__animated animate__pulse animate__infinite">
      <div class="loading" style="width: 40px; height: 40px; margin: 0 auto 1rem;"></div>
      <div style="font-size: 1.1rem;"><i class="fas fa-sync-alt"></i> Cargando endpoints...</div>
    </div>

    <div class="footer animate__animated animate__fadeInUp">
      <div class="social-icons">
        <a href="https://github.com/devhades02" class="social-icon" title="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="#" class="social-icon" title="Twitter">
          <i class="fab fa-twitter"></i>
        </a>
        <a href="#" class="social-icon" title="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="#" class="social-icon" title="Portfolio">
          <i class="fas fa-briefcase"></i>
        </a>
      </div>
      <div>
        <i class="fas fa-code"></i> Hecho con <i class="fas fa-heart" style="color: var(--danger);"></i> desde Perú por Hady D'xyz
      </div>
      <div style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary);">
        &copy; 2024 Hady APIs - Todos los derechos reservados
      </div>
    </div>
  </div>

  <script>
    const music = document.getElementById("music");
    const API_BASE = window.location.origin;
    let allEndpoints = [];
    let currentCategory = 'all';

    // Cargar endpoints automáticamente
    async function loadEndpoints() {
      try {
        const startTime = Date.now();
        const response = await fetch(`${API_BASE}/api/endpoints`);
        const data = await response.json();
        const responseTime = Date.now() - startTime;
        
        if (data.status) {
          allEndpoints = data.endpoints;
          displayEndpointsByCategory(allEndpoints);
          document.getElementById('total-apis').textContent = allEndpoints.length;
          document.getElementById('response-time').textContent = `${responseTime}ms`;
          document.getElementById('loading-state').style.display = 'none';
        }
      } catch (error) {
        document.getElementById('loading-state').innerHTML = `
          <div style="text-align: center; padding: 2rem; color: var(--danger);">
            <i class="fas fa-exclamation-triangle" style="font-size: 2.5rem; margin-bottom: 1rem;"></i>
            <div style="font-size: 1.1rem;">Error cargando endpoints</div>
            <div style="color: var(--text-secondary); margin-top: 0.5rem;">${error.message}</div>
          </div>
        `;
      }
    }
    
    function startMusic() {
    music.play().catch(() => {});
    document.removeEventListener("click", startMusic);
  }

  // Inicia la música al primer clic en la pantalla
  document.addEventListener("click", startMusic);

    // Función para actualizar todo
    async function refreshAllEndpoints() {
      const refreshBtn = document.querySelector('.refresh-btn');
      const originalText = refreshBtn.innerHTML;
      
      refreshBtn.innerHTML = '<div class="loading"></div> Actualizando...';
      refreshBtn.disabled = true;
      
      await loadEndpoints();
      
      refreshBtn.innerHTML = originalText;
      refreshBtn.disabled = false;
    }

    // Organizar endpoints por categoría
    function displayEndpointsByCategory(endpoints) {
      // Agrupar por categoría
      const categories = {};
      
      endpoints.forEach(endpoint => {
        const category = endpoint.category || 'General';
        if (!categories[category]) {
          categories[category] = [];
        }
        categories[category].push(endpoint);
      });
      
      // Generar navegación de categorías
      generateCategoryNav(categories);
      
      // Generar secciones de categorías
      generateCategorySections(categories);
      
      // Mostrar la categoría activa
      showCategory(currentCategory);
    }

    // Generar navegación de categorías
    function generateCategoryNav(categories) {
      const navContainer = document.getElementById('categories-nav');
      const categoryNames = Object.keys(categories);
      
      let navHTML = `
        <button class="category-btn ${currentCategory === 'all' ? 'active' : ''}" 
                onclick="showCategory('all')">
          <i class="fas fa-layer-group"></i> Todas (${allEndpoints.length})
        </button>
      `;
      
      categoryNames.forEach(category => {
        const count = categories[category].length;
        navHTML += `
          <button class="category-btn ${currentCategory === category ? 'active' : ''}" 
                  onclick="showCategory('${category}')">
            <i class="fas fa-${getCategoryIcon(category)}"></i> ${category} (${count})
          </button>
        `;
      });
      
      navContainer.innerHTML = navHTML;
    }

    // Generar secciones de categorías
    function generateCategorySections(categories) {
      const container = document.getElementById('categories-container');
      const categoryNames = Object.keys(categories);
      
      let sectionsHTML = `
        <div class="category-section ${currentCategory === 'all' ? 'active' : ''}" id="category-all">
          <div class="category-header">
            <div class="category-icon">
              <i class="fas fa-layer-group"></i>
            </div>
            <h2 class="category-title">Todas las APIs</h2>
            <span class="category-count">${allEndpoints.length}</span>
          </div>
          <div class="endpoints-list" id="endpoints-all">
            ${allEndpoints.map((endpoint, index) => createEndpointCard(endpoint, index)).join('')}
          </div>
        </div>
      `;
      
      categoryNames.forEach(category => {
        const endpoints = categories[category];
        sectionsHTML += `
          <div class="category-section ${currentCategory === category ? 'active' : ''}" id="category-${category}">
            <div class="category-header">
              <div class="category-icon">
                <i class="fas fa-${getCategoryIcon(category)}"></i>
              </div>
              <h2 class="category-title">${category}</h2>
              <span class="category-count">${endpoints.length}</span>
            </div>
            <div class="endpoints-list" id="endpoints-${category}">
              ${endpoints.map((endpoint, index) => createEndpointCard(endpoint, index)).join('')}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = sectionsHTML;
    }

    // Mostrar categoría específica
    function showCategory(category) {
      currentCategory = category;
      
      // Ocultar todas las secciones
      document.querySelectorAll('.category-section').forEach(section => {
        section.classList.remove('active');
      });
      
      // Mostrar la sección activa
      const activeSection = document.getElementById(`category-${category}`);
      if (activeSection) {
        activeSection.classList.add('active');
      }
      
      // Actualizar botones de navegación
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      
      document.querySelector(`.category-btn[onclick="showCategory('${category}')"]`).classList.add('active');
    }

    // Crear tarjeta de endpoint
    function createEndpointCard(endpoint, index) {
      return `
        <div class="endpoint-card animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
          <div class="endpoint-header">
            <div class="endpoint-method">
              <i class="fas fa-${getMethodIcon(endpoint.method)}"></i> ${endpoint.method}
            </div>
            <div class="endpoint-name">/api/${endpoint.name}</div>
          </div>
          <div class="endpoint-description">
            <i class="fas fa-${getEndpointIcon(endpoint.name)}"></i> ${endpoint.description}
          </div>
          
          ${endpoint.parameters && endpoint.parameters.length > 0 ? `
            <div class="parameters">
              <strong><i class="fas fa-sliders-h"></i> Parámetros:</strong>
              ${endpoint.parameters.map(param => `
                <div class="param-item">
                  <span class="param-name">
                    <i class="fas fa-${getParamIcon(param.type)}"></i> ${param.name}
                  </span>
                  <span class="param-type">${param.type}${param.required ? ' <i class="fas fa-asterisk" style="color: var(--danger); font-size: 0.7em;"></i>' : ''}</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
          
          <div class="try-section">
            ${generateInputs(endpoint)}
            <div class="action-buttons">
              <button class="action-btn primary tooltip" data-tooltip="Probar Endpoint" onclick="testEndpoint('${endpoint.name}', this)">
                <i class="fas fa-play"></i>
              </button>
              <button class="action-btn warning tooltip" data-tooltip="Ver JSON" onclick="toggleJson('${endpoint.name}', this)" id="json-toggle-${endpoint.name}">
                <i class="fas fa-code"></i>
              </button>
              <button class="action-btn success tooltip" data-tooltip="Copiar JSON" onclick="copyResult('${endpoint.name}')" id="copy-${endpoint.name}">
                <i class="fas fa-copy"></i>
              </button>
            </div>
            <div class="result hidden" id="result-${endpoint.name}"></div>
          </div>
        </div>
      `;
    }

    // Iconos dinámicos
    function getMethodIcon(method) {
      const icons = {
        'GET': 'download',
        'POST': 'upload',
        'PUT': 'edit',
        'DELETE': 'trash'
      };
      return icons[method] || 'code';
    }

    function getEndpointIcon(endpointName) {
      const icons = {
        'music': 'music',
        'tobase64': 'key',
        'status': 'heartbeat',
        'endpoints': 'list'
      };
      return icons[endpointName] || 'cog';
    }

    function getParamIcon(type) {
      const icons = {
        'string': 'font',
        'number': 'hashtag',
        'boolean': 'toggle-on',
        'array': 'list'
      };
      return icons[type] || 'tag';
    }

    function getCategoryIcon(category) {
      const icons = {
        'Información': 'info-circle',
        'Descargas': 'download',
        'IA': 'brain',
        'Entretenimiento': 'gamepad',
        'Utilidades': 'tools'
      };
      return icons[category] || 'folder';
    }

    // Generar inputs dinámicamente
    function generateInputs(endpoint) {
      if (!endpoint.parameters || endpoint.parameters.length === 0) {
        return '';
      }

      return endpoint.parameters.map(param => `
        <div class="input-group">
          <i class="fas fa-${getParamIcon(param.type)} input-icon"></i>
          <input type="text" 
                 id="${endpoint.name}-${param.name}" 
                 placeholder="${param.name} (${param.type})${param.required ? ' *' : ''}"
                 value="${param.example || ''}">
        </div>
      `).join('');
    }

    // Probar endpoint
    async function testEndpoint(endpointName, button) {
      const resultDiv = document.getElementById(`result-${endpointName}`);
      const originalHTML = button.innerHTML;
      
      // Mostrar loading
      button.disabled = true;
      button.innerHTML = '<div class="loading"></div>';
      resultDiv.classList.add('hidden');

      try {
        const params = new URLSearchParams();
        
        // Obtener valores de los inputs
        const endpoint = await getEndpointInfo(endpointName);
        if (endpoint.parameters) {
          endpoint.parameters.forEach(param => {
            const input = document.getElementById(`${endpointName}-${param.name}`);
            if (input && input.value) {
              params.append(param.name, input.value);
            } else if (param.required) {
              throw new Error(`Parámetro "${param.name}" es requerido`);
            }
          });
        }

        const url = `${API_BASE}/api/${endpointName}?${params.toString()}`;
        const startTime = Date.now();
        const response = await fetch(url);
        const data = await response.json();
        const responseTime = Date.now() - startTime;

        // Actualizar tiempo de respuesta
        document.getElementById('response-time').textContent = `${responseTime}ms`;

        // Mostrar resultado
        resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        resultDiv.classList.remove('hidden');

      } catch (error) {
        resultDiv.innerHTML = `
          <div style="color: var(--danger);">
            <i class="fas fa-exclamation-circle"></i> Error: ${error.message}
          </div>
        `;
        resultDiv.classList.remove('hidden');
      } finally {
        // Restaurar botón
        button.disabled = false;
        button.innerHTML = originalHTML;
      }
    }

    // Toggle JSON visibility
    function toggleJson(endpointName, button) {
      const resultDiv = document.getElementById(`result-${endpointName}`);
      const isVisible = !resultDiv.classList.contains('hidden');
      
      if (isVisible) {
        resultDiv.classList.add('hidden');
        button.innerHTML = '<i class="fas fa-code"></i>';
        button.setAttribute('data-tooltip', 'Ver JSON');
      } else {
        resultDiv.classList.remove('hidden');
        button.innerHTML = '<i class="fas fa-eye-slash"></i>';
        button.setAttribute('data-tooltip', 'Ocultar JSON');
      }
    }

    // Copiar resultado al portapapeles
    async function copyResult(endpointName) {
      const resultDiv = document.getElementById(`result-${endpointName}`);
      const copyBtn = document.getElementById(`copy-${endpointName}`);
      const originalHTML = copyBtn.innerHTML;
      
      try {
        const text = resultDiv.querySelector('pre')?.textContent || resultDiv.textContent;
        if (!text) {
          throw new Error('No hay resultado para copiar');
        }
        
        await navigator.clipboard.writeText(text);
        copyBtn.innerHTML = '<i class="fas fa-check"></i>';
        copyBtn.setAttribute('data-tooltip', '¡Copiado!');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalHTML;
          copyBtn.setAttribute('data-tooltip', 'Copiar JSON');
        }, 2000);
        
      } catch (error) {
        copyBtn.innerHTML = '<i class="fas fa-times"></i>';
        copyBtn.setAttribute('data-tooltip', 'Error al copiar');
        setTimeout(() => {
          copyBtn.innerHTML = originalHTML;
          copyBtn.setAttribute('data-tooltip', 'Copiar JSON');
        }, 2000);
      }
    }

    // Obtener información de un endpoint específico
    async function getEndpointInfo(endpointName) {
      return allEndpoints.find(e => e.name === endpointName) || {};
    }

    // Cargar endpoints al iniciar
    document.addEventListener('DOMContentLoaded', function() {
      loadEndpoints();
    });
  </script>
</body>
</html>
